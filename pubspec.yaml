name: status_protocol
description: A plug-and-play Flutter package for handling HTTP status code UI states with SVG illustrations, messages, and action buttons.
version: 1.0.0
homepage: https://github.com/your-org/status_protocol
repository: https://github.com/your-org/status_protocol
issue_tracker: https://github.com/your-org/status_protocol/issues
documentation: https://github.com/your-org/status_protocol#readme
topics:
  - http-status-codes
  - error-screen
  - error-handling
  - flutter
  - widget

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_svg: ^2.0.17

dev_dependencies:
  flutter_test:
    sdk: flutter

flutter:
  assets:
    - assets/svg/
